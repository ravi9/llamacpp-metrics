name: daily-metrics

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 4 * * *'   # daily
  workflow_dispatch:

# Least-privilege (Constitution V): exactly these three.
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-metrics
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: install deps
        run: |
          npm install playwright ajv ajv-formats
          npx playwright install --with-deps chromium

      - name: collect releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/collect-releases.sh

      - name: aggregate
        run: scripts/aggregate.sh

      - name: validate schema
        run: node scripts/validate-metrics.mjs metrics.json

      # Idempotent commit (Constitution VI, research D7): diff the data payload
      # excluding last_compiled; commit only on real change, [skip ci] to avoid loops.
      - name: commit on change
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          payload() { jq -S 'del(.last_compiled)' "$1"; }
          new=$(payload metrics.json)
          old=$(git show HEAD:metrics.json 2>/dev/null | jq -S 'del(.last_compiled)' 2>/dev/null || echo "null")
          if [ "$new" = "$old" ]; then
            echo "commit: no data change, skipping"
          else
            git add metrics.json data/raw/
            git commit -m "data: refresh metrics [skip ci]"
            git push
            echo "commit: pushed data change"
          fi

      - name: setup pages
        uses: actions/configure-pages@v5

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: deploy pages
        uses: actions/deploy-pages@v4
